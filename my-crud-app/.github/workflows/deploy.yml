name: Deploy to AWS ECS

# Monorepo: APP_PATH is the folder containing the Dockerfile.
# If the Git repo root is the app itself, set APP_PATH to "." below.
on:
  push:
    branches:
      - main

env:
  APP_PATH: my-crud-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ${{ env.APP_PATH }}
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}"
          docker build \
            --build-arg REACT_APP_GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ secrets.ECS_TASK_DEFINITION }}" \
            --query taskDefinition \
            --output json > taskdef.json

      - name: Clean task definition for registration
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy,
            .deregisteredAt
          )' taskdef.json > taskdef-clean.json

      - name: Inject new image
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
        run: |
          jq --arg img "$IMAGE_URI" \
            '.containerDefinitions[0].image = $img' taskdef-clean.json > taskdef-new.json

      - name: Register task definition
        id: register
        run: |
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE }}" \
            --task-definition "${{ steps.register.outputs.arn }}" \
            --force-new-deployment
